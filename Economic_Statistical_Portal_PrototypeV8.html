function mulberry32(seed) {
  return function () {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeSeries(months, rand, o) {
  const { base = 0, trend = 0, growth = null, season = 0, phase = 0,
          noise = 0, shock = 0, shockStart = 0, shockLen = 0,
          floor = null, cap = null, int: asInt = false, dp = 2 } = o;
  return months.map((m, i) => {
    let v = growth != null ? base * Math.pow(1 + growth, i) : base + trend * i;
    if (season) v += season * Math.sin((i / 12) * 2 * Math.PI + phase);
    if (shock && i >= shockStart && i < shockStart + shockLen) {
      v += shock * Math.sin(((i - shockStart) / shockLen) * Math.PI);
    }
    if (noise) v += (rand() - 0.5) * noise;
    if (floor != null) v = Math.max(floor, v);
    if (cap != null)   v = Math.min(cap, v);
    return asInt ? Math.round(v) : +v.toFixed(dp);
  });
}

    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  return { width: w,
           isMobile: w < 640,
           isTablet: w >= 640 && w < 1024,
           isDesktop: w >= 1024 };
};

// ============================================================================
// DATA TRANSFORMATIONS
// None / Log / First difference / Z-score / Robust-IQR
//   + compound presets for ML
//   + Kalman Filter (trend / cycle)
//   + HP Filter      (trend / cycle)
// ============================================================================

// ---------------- Kalman smoother (Rauch–Tung–Striebel local-level) --------
function kalmanSmooth(values) {
  const n = values.length;
  if (n === 0) return [];
  const firstValid = values.findIndex(v => typeof v === 'number' && !isNaN(v));
  if (firstValid === -1) return values.map(() => null);
  const valid = values.filter(v => typeof v === 'number' && !isNaN(v));
  const mean = valid.reduce((a,b) => a+b, 0) / valid.length;
  const variance = valid.reduce((a,b) => a + (b-mean)*(b-mean), 0) / Math.max(1, valid.length - 1);
  const R = Math.max(variance, 1e-8);
  const Q = R * 0.002;
  const xFilt = new Array(n), PFilt = new Array(n), xPred = new Array(n), PPred = new Array(n);
  for (let i = 0; i < firstValid; i++) { xFilt[i] = null; PFilt[i] = null; }
  xFilt[firstValid] = values[firstValid];
  PFilt[firstValid] = R;
  for (let t = firstValid + 1; t < n; t++) {
    xPred[t] = xFilt[t-1];
    PPred[t] = PFilt[t-1] + Q;
    const yt = values[t];
    if (typeof yt === 'number' && !isNaN(yt)) {
      const K = PPred[t] / (PPred[t] + R);
      xFilt[t] = xPred[t] + K * (yt - xPred[t]);
      PFilt[t] = (1 - K) * PPred[t];
    } else {
      xFilt[t] = xPred[t]; PFilt[t] = PPred[t];
    }
  }
  const xSmooth = new Array(n);
  xSmooth[n-1] = xFilt[n-1];
  for (let t = n - 2; t >= firstValid; t--) {
    if (PPred[t+1] > 0) {
      const A = PFilt[t] / PPred[t+1];
      xSmooth[t] = xFilt[t] + A * (xSmooth[t+1] - xPred[t+1]);
    } else {
      xSmooth[t] = xFilt[t];
    }
  }
  for (let i = 0; i < firstValid; i++) xSmooth[i] = null;
  return xSmooth.map(v => v === null ? null : +v.toFixed(4));
}

// ---------------- Hodrick–Prescott filter -----------------------------------
// Solves (I + λ·K'K)·τ = y  where K is the (n-2)×n second-difference matrix.
// Lambda is chosen by frequency: Annual→100, Quarterly→1600, Monthly→14400.
// Simple O(n³) Gaussian elimination — n ≤ 60, so runtime is trivial.
function hpFilter(values, lambda = 14400) {
  const n = values.length;
  if (n < 4) return values.slice();
  // Replace missing with linear interpolation so the linear system is well-posed
  const y = values.slice().map(v => (typeof v === 'number' && !isNaN(v)) ? v : null);
  for (let i = 0; i < n; i++) {
    if (y[i] === null) {
      let l = i - 1, r = i + 1;
      while (l >= 0 && y[l] === null) l--;
      while (r < n  && y[r] === null) r++;
      if (l >= 0 && r < n)       y[i] = y[l] + ((y[r] - y[l]) * (i - l)) / (r - l);
      else if (l >= 0)           y[i] = y[l];
      else if (r < n)            y[i] = y[r];
      else                       y[i] = 0;
    }
  }
  // Build A = I + λ·K'K  (pentadiagonal, stored dense for simplicity)
  const A = Array.from({ length: n }, () => new Array(n).fill(0));
  for (let i = 0; i < n; i++) A[i][i] = 1;
  for (let i = 0; i < n - 2; i++) {
    const cols = [i, i + 1, i + 2];
    const vals = [1, -2, 1];
    for (let a = 0; a < 3; a++)
      for (let b = 0; b < 3; b++)
        A[cols[a]][cols[b]] += lambda * vals[a] * vals[b];
  }
  // Gaussian elimination on [A|y]
  const M = A.map((row, i) => [...row, y[i]]);
  for (let k = 0; k < n; k++) {
    let maxVal = Math.abs(M[k][k]);
    let maxIdx = k;
    for (let i = k + 1; i < n; i++) {
      if (Math.abs(M[i][k]) > maxVal) { maxVal = Math.abs(M[i][k]); maxIdx = i; }
    }
    if (maxIdx !== k) { const tmp = M[k]; M[k] = M[maxIdx]; M[maxIdx] = tmp; }
    if (Math.abs(M[k][k]) < 1e-12) continue;
    for (let i = k + 1; i < n; i++) {
      const factor = M[i][k] / M[k][k];
      if (factor === 0) continue;
      for (let j = k; j <= n; j++) M[i][j] -= factor * M[k][j];
    }
  }
  const tau = new Array(n);
  for (let i = n - 1; i >= 0; i--) {
    let sum = M[i][n];
    for (let j = i + 1; j < n; j++) sum -= M[i][j] * tau[j];
    tau[i] = M[i][i] ? sum / M[i][i] : sum;
  }
  // Re-null the original NaNs
  const out = tau.map((v, i) => (typeof values[i] === 'number' && !isNaN(values[i]))
    ? +v.toFixed(4) : null);
  return out;
}

function _applyBasic(values, method) {
  if (method === 'Log') {
    return values.map(v => (typeof v === 'number' && v > 0 ? +Math.log(v).toFixed(4) : null));
  }
  if (method === 'First difference' || method === 'Differencing') {
    return values.map((v, i) => {
      if (i === 0) return null;
      const a = values[i-1]; const b = v;
      if (typeof a !== 'number' || typeof b !== 'number') return null;
      return +(b - a).toFixed(4);
    });
  }
  if (method === 'Z-score') {
    const valid = values.filter(v => typeof v === 'number' && !isNaN(v));
    if (!valid.length) return values;
    const mean = valid.reduce((a,b) => a+b, 0) / valid.length;
    const variance = valid.reduce((a,b) => a + (b-mean)*(b-mean), 0) / valid.length;
    const std = Math.sqrt(variance);
    return std === 0 ? values.map(v => typeof v === 'number' ? 0 : null)
                     : values.map(v => typeof v === 'number' ? +((v - mean) / std).toFixed(4) : null);
  }
  if (method === 'Robust (IQR)' || method === 'Robust-IQR') {
    const sorted = [...values].filter(v => typeof v === 'number' && !isNaN(v)).sort((a,b) => a-b);
    if (!sorted.length) return values;
    const q = (p) => sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * p))];
    const median = q(0.5), q1 = q(0.25), q3 = q(0.75);
    const iqr = q3 - q1;
    return iqr === 0 ? values.map(v => typeof v === 'number' ? 0 : null)
                     : values.map(v => typeof v === 'number' ? +((v - median) / iqr).toFixed(4) : null);
  }
  return values;
}

function transformSeries(values, method, frequency = 'Monthly') {
  if (!method || method === 'None' || values.length === 0) return values;

  // Compound presets — Log first, then the second step
  if (method === 'Log + Diff (forecasting)')
    return _applyBasic(_applyBasic(values, 'Log'), 'First difference');
  if (method === 'Log + Z-score (ML, few outliers)')
    return _applyBasic(_applyBasic(values, 'Log'), 'Z-score');
  if (method === 'Log + Robust-IQR (ML, many outliers)')
    return _applyBasic(_applyBasic(values, 'Log'), 'Robust (IQR)');

  // Kalman Filter — trend and cyclical component
  if (method === 'Kalman Filter (trend)') return kalmanSmooth(values);
  if (method === 'Kalman Filter (cycle)') {
    const trend = kalmanSmooth(values);
    return values.map((v, i) => (typeof v === 'number' && typeof trend[i] === 'number')
      ? +(v - trend[i]).toFixed(4) : null);
  }

  // HP Filter — lambda by frequency (Ravn-Uhlig)
  if (method === 'HP Filter (trend)' || method === 'HP Filter (cycle)') {
    const lam = frequency === 'Annual' ? 100 : (frequency === 'Quarterly' ? 1600 : 14400);
    const trend = hpFilter(values, lam);
    if (method === 'HP Filter (trend)') return trend;
    return values.map((v, i) => (typeof v === 'number' && typeof trend[i] === 'number')
      ? +(v - trend[i]).toFixed(4) : null);
  }

  return _applyBasic(values, method);
}

function canShowDemographic(selectedIds) {
  return selectedIds.some(id => INDICATORS.find(i => i.id === id)?.demographic);
}

// ============================================================================
// FREQUENCY AGGREGATION
// ============================================================================
function aggregate(months, values, freq, method) {
  if (freq === 'Monthly') {
    return months.map((m, i) => ({ label: m.label, key: m.key, value: +values[i] }));
  }
  const grouped = {};
  months.forEach((m, i) => {
    const d = m.date;
    const year = d.getFullYear();
    let bucketKey, bucketLabel;
    if (freq === 'Quarterly') {
      const q = Math.floor(d.getMonth() / 3) + 1;
      bucketKey = `${year}-Q${q}`;
      bucketLabel = `${year} Q${q}`;
    } else {
      bucketKey = `${year}`;
      bucketLabel = `${year}`;
    }
    if (!grouped[bucketKey]) grouped[bucketKey] = { label: bucketLabel, key: bucketKey, vals: [] };
    grouped[bucketKey].vals.push(+values[i]);
  });
  return Object.values(grouped).map(b => {
    let v;
    if (method === 'sum')      v = b.vals.reduce((a, c) => a + c, 0);
    else if (method === 'last')v = b.vals[b.vals.length - 1];
    else                       v = b.vals.reduce((a, c) => a + c, 0) / b.vals.length;
    return { label: b.label, key: b.key, value: +v.toFixed(3) };
  });
}

// ============================================================================
// PEAKS & TROUGHS DETECTION
// ============================================================================
function findExtrema(data, topN = 3) {
  const peaks = [], troughs = [];
  for (let i = 2; i < data.length - 2; i++) {
    const v = data[i].value;
    if (v > data[i-1].value && v > data[i+1].value && v >= data[i-2].value && v >= data[i+2].value) {
      peaks.push({ idx: i, value: v });
    }
    if (v < data[i-1].value && v < data[i+1].value && v <= data[i-2].value && v <= data[i+2].value) {
      troughs.push({ idx: i, value: v });
    }
  }
  return {
    peaks:   peaks.sort((a, b) => b.value - a.value).slice(0, topN).map(p => p.idx),
    troughs: troughs.sort((a, b) => a.value - b.value).slice(0, topN).map(t => t.idx)
  };
}

// ============================================================================
// EXPORT HELPERS
// ============================================================================
function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function downloadSVGAsPNG(svgEl, filename) {
  if (!svgEl) return;
  const serializer = new XMLSerializer();
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const svgStr = serializer.serializeToString(clone);
  const svg64 = btoa(unescape(encodeURIComponent(svgStr)));
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = svgEl.clientWidth * scale;
    canvas.height = svgEl.clientHeight * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0, svgEl.clientWidth, svgEl.clientHeight);
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  };
  img.src = 'data:image/svg+xml;base64,' + svg64;
}

function Dropdown({ value, options, onChange, placeholder, theme, compact = false, width = 'auto' }) {

    <div className="relative" ref={ref} style={{ width }}>

// ============================================================================
// MULTI-SELECT (GROUPED BY TOPIC)
// Variables are listed under their topic (topic acts as a read-only header).
// This replaces the previous "Topic dropdown + Variable multi-select" flow.
// ============================================================================
function MultiSelect({ selected, options, onChange, placeholder, theme, maxHeight = 260 }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState('');
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  // Group options by topic
  const grouped = useMemo(() => {
    const g = {};
    options.forEach(o => {
      const key = o.topic || 'Other';
      if (!g[key]) g[key] = [];
      g[key].push(o);
    });
    // Keep insertion order
    return g;
  }, [options]);

  const filterFn = (o) => o.name.toLowerCase().includes(q.toLowerCase())
                       || (o.topic || '').toLowerCase().includes(q.toLowerCase());

  const toggle = (id) => {
    if (selected.includes(id)) onChange(selected.filter(x => x !== id));
    else onChange([...selected, id]);
  };

  const selectAllInTopic = (topic) => {
    const ids = grouped[topic].map(o => o.id);
    const allIn = ids.every(id => selected.includes(id));
    if (allIn) onChange(selected.filter(x => !ids.includes(x)));
    else onChange(Array.from(new Set([...selected, ...ids])));
  };

  return (
    <div className="relative" ref={ref}>
      <button
        onClick={() => setOpen(!open)}
        className="flex items-center justify-between w-full text-left"
        style={{
          padding: '9px 12px', fontSize: 13,
          background: theme.surface, color: theme.text,
          border: `1px solid ${theme.border}`, borderRadius: 4
        }}
      >
        <span className="truncate">
          {selected.length === 0
            ? <span style={{ color: theme.muted }}>{placeholder}</span>
            : <span>{selected.length} selected</span>}
        </span>
        <ChevronDown size={14} style={{ color: theme.muted }} />
      </button>
      {open && (
        <div
          className="absolute left-0 right-0 mt-1 z-50 flex flex-col"
          style={{
            background: theme.surface,
            border: `1px solid ${theme.border}`,
            borderRadius: 4,
            boxShadow: '0 4px 14px rgba(0,0,0,0.12)'
          }}
        >
          <div className="flex items-center gap-2" style={{ padding: 8, borderBottom: `1px solid ${theme.border}` }}>
            <Search size={13} style={{ color: theme.muted }} />
            <input
              autoFocus
              value={q}
              onChange={e => setQ(e.target.value)}
              placeholder="Search variables or topics…"
              className="flex-1 outline-none bg-transparent"
              style={{ fontSize: 12, color: theme.text }}
            />
          </div>
          <div className="overflow-auto" style={{ maxHeight }}>
            {Object.entries(grouped).map(([topic, items]) => {
              const visible = items.filter(filterFn);
              if (visible.length === 0) return null;
              const allIn = visible.every(o => selected.includes(o.id));
              return (
                <div key={topic}>
                  <button
                    onClick={() => selectAllInTopic(topic)}
                    className="flex items-center justify-between w-full text-left"
                    style={{
                      padding: '6px 10px',
                      fontSize: 10,
                      textTransform: 'uppercase',
                      letterSpacing: '0.08em',
                      fontWeight: 600,
                      color: theme.muted,
                      background: theme.bg,
                      borderTop: `1px solid ${theme.border}`,
                      cursor: 'pointer'
                    }}
                    title={allIn ? 'Deselect all in topic' : 'Select all in topic'}
                  >
                    <span>{topic}</span>
                    <span style={{ fontSize: 9, color: theme.accent }}>
                      {allIn ? '✓ all' : `${visible.length}`}
                    </span>
                  </button>
                  {visible.map(o => (
                    <button
                      key={o.id}
                      onClick={() => toggle(o.id)}
                      className="flex items-center gap-2 w-full text-left transition-colors"
                      style={{ padding: '7px 12px 7px 18px', fontSize: 12, color: theme.text }}
                      onMouseEnter={e => e.currentTarget.style.background = theme.border}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                    >
                      <span
                        className="flex items-center justify-center"
                        style={{
                          width: 14, height: 14,
                          border: `1.5px solid ${selected.includes(o.id) ? theme.accent : theme.border}`,
                          background: selected.includes(o.id) ? theme.accent : 'transparent',
                          borderRadius: 2, flexShrink: 0
                        }}
                      >
                        {selected.includes(o.id) && <Check size={10} color="#FFFFFF" strokeWidth={3} />}
                      </span>
                      <span className="truncate" style={{ flex: 1 }}>{o.name}</span>
                      <span style={{ fontSize: 10, color: theme.muted }}>{o.unit}</span>
                    </button>
                  ))}
                </div>
              );
            })}
          </div>
          {selected.length > 0 && (
            <div style={{ padding: 6, borderTop: `1px solid ${theme.border}`, display: 'flex', flexWrap: 'wrap', gap: 4 }}>
              {selected.map(id => {
                const ind = options.find(o => o.id === id);
                return ind ? (
                  <span key={id} className="inline-flex items-center gap-1"
                    style={{ fontSize: 10, padding: '2px 6px', background: theme.accent, color: '#FFFFFF', borderRadius: 2 }}>
                    {ind.name}
                    <button onClick={(e) => { e.stopPropagation(); toggle(id); }}><X size={10} /></button>
                  </span>
                ) : null;
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================================
// DATE RANGE PICKER  —  MS-Office-style month grid calendar wizard
// Data is monthly, so the grid shows 12 months of a year at a time.
// Two "sides" — Start and End — are picked by clicking month cells.
// ============================================================================
function keyToYearMonth(key) {
  const [y, m] = key.split('-').map(Number);
  return { year: y, month: m };
}
function yearMonthToKey(y, m) {
  return `${y}-${String(m).padStart(2, '0')}`;
}
function keyCmp(a, b) { return a < b ? -1 : a > b ? 1 : 0; }
function keyLabel(key) {
  const { year, month } = keyToYearMonth(key);
  const d = new Date(year, month - 1, 1);
  return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

// Single-date month picker. Renders a button + a popover calendar.
// The popover uses position:fixed so it escapes any parent stacking
// context and always paints above surrounding content (incl. charts).
// Two instances are used side-by-side for "Start date" and "End date".
function DatePicker({ value, monthKeys, onChange, theme, label = 'Date', minKey, maxKey }) {
  const [open, setOpen] = useState(false);
  const [year, setYear] = useState(() => keyToYearMonth(value).year);
  const [coords, setCoords] = useState({ top: 0, left: 0, width: 0 });
  const btnRef = useRef(null);
  const popRef = useRef(null);

  // Close on outside click
  useEffect(() => {
    const h = (e) => {
      if (popRef.current && popRef.current.contains(e.target)) return;
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  // Reposition on open / scroll / resize
  useEffect(() => {
    if (!open) return;
    const place = () => {
      const r = btnRef.current?.getBoundingClientRect();
      if (!r) return;
      setCoords({ top: r.bottom + 4, left: r.left, width: r.width });
    };
    place();
    window.addEventListener('resize', place);
    window.addEventListener('scroll', place, true);
    return () => {
      window.removeEventListener('resize', place);
      window.removeEventListener('scroll', place, true);
    };
  }, [open]);

  // Follow the selected value if it changes externally
  useEffect(() => { setYear(keyToYearMonth(value).year); }, [value]);

  const { minYear, maxYear } = useMemo(() => {
    if (!monthKeys.length) return { minYear: 2020, maxYear: 2030 };
    const years = monthKeys.map(k => keyToYearMonth(k).year);
    return { minYear: Math.min(...years), maxYear: Math.max(...years) };
  }, [monthKeys]);
  const availableSet = useMemo(() => new Set(monthKeys), [monthKeys]);

  const pick = (y, m) => {
    const k = yearMonthToKey(y, m);
    if (!availableSet.has(k)) return;
    if (minKey && keyCmp(k, minKey) < 0) return;
    if (maxKey && keyCmp(k, maxKey) > 0) return;
    onChange(k);
    setOpen(false);
  };

  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return (
    <>
      <button
        ref={btnRef}
        onClick={() => setOpen(!open)}
        className="flex items-center justify-between w-full text-left"
        style={{
          padding: '9px 12px', fontSize: 13,
          background: theme.surface, color: theme.text,
          border: `1px solid ${theme.border}`, borderRadius: 4
        }}
      >
        <span className="flex items-center gap-2">
          <CalendarIcon size={13} style={{ color: theme.muted }} />
          <span>{keyLabel(value)}</span>
        </span>
        <ChevronDown size={14} style={{ color: theme.muted }} />
      </button>

      {open && (
        <div
          ref={popRef}
          style={{
            position: 'fixed',
            top: coords.top,
            left: coords.left,
            minWidth: Math.max(coords.width, 220),
            zIndex: 9000,
            background: theme.surface,
            border: `1px solid ${theme.border}`,
            borderRadius: 4,
            boxShadow: '0 10px 28px rgba(0,0,0,0.22)'
          }}
        >
          <div style={{
            padding: '6px 10px',
            borderBottom: `1px solid ${theme.border}`,
            fontSize: 10, color: theme.muted,
            textTransform: 'uppercase', letterSpacing: '0.08em'
          }}>
            {label}
          </div>

          <div style={{ padding: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <button
                onClick={() => year > minYear && setYear(year - 1)}
                disabled={year <= minYear}
                style={{
                  background: 'transparent',
                  border: `1px solid ${theme.border}`,
                  borderRadius: 3,
                  padding: '3px 6px',
                  cursor: year > minYear ? 'pointer' : 'not-allowed',
                  color: year > minYear ? theme.text : theme.muted,
                  display: 'flex'
                }}
              ><ChevronLeft size={12} /></button>
              <div style={{ fontSize: 13, fontWeight: 600, color: theme.text, fontFamily: 'Georgia, serif' }}>
                {year}
              </div>
              <button
                onClick={() => year < maxYear && setYear(year + 1)}
                disabled={year >= maxYear}
                style={{
                  background: 'transparent',
                  border: `1px solid ${theme.border}`,
                  borderRadius: 3,
                  padding: '3px 6px',
                  cursor: year < maxYear ? 'pointer' : 'not-allowed',
                  color: year < maxYear ? theme.text : theme.muted,
                  display: 'flex'
                }}
              ><ChevronRight size={12} /></button>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 4 }}>
              {monthNames.map((mn, idx) => {
                const m = idx + 1;
                const k = yearMonthToKey(year, m);
                const available = availableSet.has(k)
                                && (!minKey || keyCmp(k, minKey) >= 0)
                                && (!maxKey || keyCmp(k, maxKey) <= 0);
                const selected = k === value;
                return (
                  <button
                    key={m}
                    onClick={() => pick(year, m)}
                    disabled={!available}
                    style={{
                      padding: '8px 0',
                      fontSize: 11,
                      fontWeight: selected ? 700 : 400,
                      background: selected ? theme.accent : 'transparent',
                      color: selected ? (theme.buttonText || '#FFFFFF')
                           : (available ? theme.text : theme.muted),
                      border: `1px solid ${selected ? theme.accent : theme.border}`,
                      borderRadius: 3,
                      cursor: available ? 'pointer' : 'not-allowed',
                      opacity: available ? 1 : 0.35
                    }}
                  >
                    {mn}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ============================================================================
// COLOR PALETTE EDITOR — swatch grid with native color pickers + hex readout
// User can pick a preset OR customise each swatch individually. Hex codes
// are displayed beneath each swatch; clicking a swatch opens the native picker.
// ============================================================================
// ---------- Colour conversion helpers ------------------------------------
function hexToRgb(hex) {
  const h = (hex || '').replace(/^#/, '');
  const norm = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
  if (!/^[0-9A-Fa-f]{6}$/.test(norm)) return { r: 0, g: 0, b: 0 };
  return {
    r: parseInt(norm.substring(0, 2), 16),
    g: parseInt(norm.substring(2, 4), 16),
    b: parseInt(norm.substring(4, 6), 16)
  };
}
function rgbToHex(r, g, b) {
  const clamp = v => Math.max(0, Math.min(255, Math.round(+v || 0)));
  const to = v => clamp(v).toString(16).padStart(2, '0').toUpperCase();
  return '#' + to(r) + to(g) + to(b);
}
function normalizeHex(s) {
  let h = (s || '').trim().replace(/^#/, '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  if (!/^[0-9A-Fa-f]{6}$/.test(h)) return null;
  return '#' + h.toUpperCase();
}

// ============================================================================
// COLOUR PICKER MODAL (MS-Word style)
//
// Renders as a FULL-SCREEN modal with a dim backdrop, guaranteed to paint
// above all page content (z-index 10000, position: fixed). Shows three
// panels in one view so nothing is cut off:
//   1. Theme colours — every preset palette, one row of swatch buttons each
//   2. Standard colours — 16 common design colours
//   3. Custom colour — native colour wheel + HEX field + R/G/B fields;
//      both codes are always displayed in a dual readout.
//
// The top of the modal has a Series selector so the user can switch which
// series' colour is being edited without closing the modal. Changes apply
// live to the chart; "Done" closes the modal.
// ============================================================================
const STANDARD_COLORS = [
  '#000000', '#434343', '#666666', '#999999', '#CCCCCC', '#FFFFFF',
  '#C00000', '#E67E22', '#F1C40F', '#2ECC71', '#16A085', '#1F3864',
  '#3498DB', '#6A1B9A', '#E91E63', '#795548'
];

function ColorPickerModal({ colors, activeIndex, onChangeColors, onChangeActive, onClose, theme }) {
  const hex = normalizeHex(colors[activeIndex]) || '#000000';
  const rgb = hexToRgb(hex);
  const [hexInput, setHexInput] = useState(hex);
  const [r, setR] = useState(rgb.r);
  const [g, setG] = useState(rgb.g);
  const [b, setB] = useState(rgb.b);

  // Sync inputs when the active series changes, or when the committed colour
  // changes from outside (e.g., preset clicked)
  useEffect(() => {
    setHexInput(hex);
    const v = hexToRgb(hex);
    setR(v.r); setG(v.g); setB(v.b);
  }, [hex]);

  const setActiveColor = (c) => {
    const norm = normalizeHex(c);
    if (!norm) return;
    const next = colors.slice();
    next[activeIndex] = norm;
    onChangeColors(next);
  };

  const onHexField = (e) => {
    const v = e.target.value;
    setHexInput(v);
    const norm = normalizeHex(v);
    if (norm) setActiveColor(norm);
  };
  const onRgbField = (ch, v) => {
    const n = Math.max(0, Math.min(255, parseInt(v, 10) || 0));
    const nr = ch === 'r' ? n : r;
    const ng = ch === 'g' ? n : g;
    const nb = ch === 'b' ? n : b;
    setR(nr); setG(ng); setB(nb);
    setActiveColor(rgbToHex(nr, ng, nb));
  };

  // Close on Escape
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const rowLabelStyle = {
    fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em',
    color: theme.muted, fontWeight: 600, marginBottom: 6
  };
  const numInputStyle = {
    flex: 1, fontSize: 12, padding: '5px 6px',
    background: theme.bg, color: theme.text,
    border: `1px solid ${theme.border}`, borderRadius: 3,
    fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
    textAlign: 'center', minWidth: 0
  };

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 10000,
        background: 'rgba(10, 14, 24, 0.55)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 20,
        backdropFilter: 'blur(2px)'
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: theme.surface,
          border: `1px solid ${theme.border}`,
          borderRadius: 6,
          boxShadow: '0 20px 50px rgba(0,0,0,0.35)',
          width: 'min(520px, 100%)',
          maxHeight: '90vh',
          overflow: 'auto',
          color: theme.text
        }}
      >
        {/* Header */}
        <div style={{
          padding: '12px 16px',
          borderBottom: `1px solid ${theme.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between'
        }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, fontFamily: 'Georgia, serif' }}>
              Chart colour picker
            </div>
            <div style={{ fontSize: 10, color: theme.muted, marginTop: 2 }}>
              Pick a colour from a palette, a standard colour, or a custom HEX / RGB value.
            </div>
          </div>
          <button
            onClick={onClose}
            aria-label="Close"
            style={{
              background: 'transparent', border: 'none', color: theme.muted,
              cursor: 'pointer', padding: 4, display: 'flex'
            }}
          ><X size={16} /></button>
        </div>

        {/* Series selector */}
        <div style={{ padding: '12px 16px', borderBottom: `1px solid ${theme.border}` }}>
          <div style={rowLabelStyle}>Editing series</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {colors.map((c, i) => {
              const active = i === activeIndex;
              return (
                <button
                  key={i}
                  onClick={() => onChangeActive(i)}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 6,
                    padding: '5px 10px',
                    fontSize: 11,
                    background: active ? theme.border : 'transparent',
                    color: theme.text,
                    border: `1px solid ${active ? theme.accent : theme.border}`,
                    borderRadius: 4,
                    cursor: 'pointer',
                    fontWeight: active ? 600 : 400
                  }}
                >
                  <span style={{
                    display: 'inline-block', width: 12, height: 12,
                    background: c, border: `1px solid rgba(0,0,0,0.2)`, borderRadius: 2
                  }} />
                  Series&nbsp;{i + 1}
                </button>
              );
            })}
          </div>
        </div>

        {/* Theme colours */}
        <div style={{ padding: '12px 16px', borderBottom: `1px solid ${theme.border}` }}>
          <div style={rowLabelStyle}>Theme colours (from preset palettes)</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            {Object.entries(PALETTES).map(([name, cols]) => (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{
                  fontSize: 10, color: theme.muted, width: 130, flexShrink: 0,
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
                }} title={name}>
                  {name}
                </div>
                <div style={{ display: 'flex', gap: 2, flex: 1 }}>
                  {cols.map((c, i) => {
                    const norm = normalizeHex(c);
                    const picked = norm === hex;
                    const rr = hexToRgb(c);
                    return (
                      <button
                        key={i}
                        onClick={() => setActiveColor(c)}
                        title={`${(norm || c).toUpperCase()} · rgb(${rr.r}, ${rr.g}, ${rr.b})`}
                        style={{
                          flex: 1, height: 20, background: c,
                          border: `2px solid ${picked ? theme.accent : 'rgba(0,0,0,0.12)'}`,
                          cursor: 'pointer', borderRadius: 3, padding: 0
                        }}
                      />
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Standard colours */}
        <div style={{ padding: '12px 16px', borderBottom: `1px solid ${theme.border}` }}>
          <div style={rowLabelStyle}>Standard colours</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 3 }}>
            {STANDARD_COLORS.map((c, i) => {
              const picked = normalizeHex(c) === hex;
              const rr = hexToRgb(c);
              return (
                <button
                  key={i}
                  onClick={() => setActiveColor(c)}
                  title={`${c} · rgb(${rr.r}, ${rr.g}, ${rr.b})`}
                  style={{
                    height: 24, background: c,
                    border: `2px solid ${picked ? theme.accent : 'rgba(0,0,0,0.15)'}`,
                    cursor: 'pointer', borderRadius: 3, padding: 0
                  }}
                />
              );
            })}
          </div>
        </div>

        {/* Custom colour */}
        <div style={{ padding: '12px 16px' }}>
          <div style={rowLabelStyle}>Custom colour</div>
          <div style={{ display: 'flex', gap: 14, alignItems: 'stretch' }}>
            {/* Native wheel */}
            <div style={{ position: 'relative', width: 96, flexShrink: 0 }}>
              <input
                type="color"
                value={hex}
                onChange={(e) => setActiveColor(e.target.value.toUpperCase())}
                style={{
                  position: 'absolute', inset: 0, width: '100%', height: '100%',
                  opacity: 0, cursor: 'pointer', border: 0, padding: 0
                }}
                aria-label="Open colour wheel"
              />
              <div style={{
                width: '100%', height: 72, background: hex,
                border: `1px solid ${theme.border}`, borderRadius: 4,
                boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.22)',
                pointerEvents: 'none'
              }} />
              <div style={{
                fontSize: 9, color: theme.muted, textAlign: 'center', marginTop: 4,
                textTransform: 'uppercase', letterSpacing: '0.08em'
              }}>
                Click for wheel
              </div>
            </div>

            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
              {/* HEX */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <label style={{ fontSize: 11, color: theme.muted, width: 34, fontWeight: 600 }}>Hex</label>
                <input
                  value={hexInput}
                  onChange={onHexField}
                  spellCheck={false}
                  style={{
                    flex: 1, fontSize: 12, padding: '5px 8px',
                    background: theme.bg, color: theme.text,
                    border: `1px solid ${theme.border}`, borderRadius: 3,
                    fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
                    textTransform: 'uppercase', letterSpacing: '0.04em'
                  }}
                />
              </div>
              {/* RGB */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <label style={{ fontSize: 11, color: theme.muted, width: 34, fontWeight: 600 }}>RGB</label>
                <input type="number" value={r} min="0" max="255"
                  onChange={(e) => onRgbField('r', e.target.value)} style={numInputStyle} title="Red 0–255" />
                <input type="number" value={g} min="0" max="255"
                  onChange={(e) => onRgbField('g', e.target.value)} style={numInputStyle} title="Green 0–255" />
                <input type="number" value={b} min="0" max="255"
                  onChange={(e) => onRgbField('b', e.target.value)} style={numInputStyle} title="Blue 0–255" />
              </div>
              {/* Dual-code readout */}
              <div style={{
                fontSize: 11, color: theme.muted, lineHeight: 1.4,
                fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace',
                padding: '6px 8px', background: theme.bg,
                border: `1px solid ${theme.border}`, borderRadius: 3
              }}>
                <div>HEX&nbsp;&nbsp;{hex}</div>
                <div>RGB&nbsp;&nbsp;rgb({r}, {g}, {b})</div>
              </div>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{
          padding: '10px 16px',
          borderTop: `1px solid ${theme.border}`,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10
        }}>
          <div style={{ fontSize: 10, color: theme.muted }}>
            Changes apply to the chart immediately.
          </div>
          <button
            onClick={onClose}
            style={{
              fontSize: 12, padding: '6px 18px', fontWeight: 600,
              background: theme.accent, color: theme.buttonText || '#FFFFFF',
              border: 'none', borderRadius: 4, cursor: 'pointer'
            }}
          >Done</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================

// The left panel holds just the preset selector, a colour-strip preview, and
// a reset button. Per-chart recolouring is handled by the "Color" button

function ColorPaletteEditor({ colors, onChange, presetName, onPresetChange, theme }) {

          options={[...Object.keys(PALETTES), 'Custom']}
          onChange={(v) => {

            else { onPresetChange(v); onChange(PALETTES[v].slice()); }
          }}
          theme={theme} compact
        />
      </div>
      {/* Compact colour strip — informational preview of current default palette */}
      <div style={{
        display: 'flex', height: 10, borderRadius: 2, overflow: 'hidden',
        border: `1px solid ${theme.border}`, marginBottom: 8
      }}>
        {colors.map((c, i) => (
          <div key={i} style={{ flex: 1, background: c }} />
        ))}
      </div>
      <button
        onClick={() => { onChange(SERIES_COLORS.slice()); onPresetChange('Default (institutional)'); }}
        style={{
          width: '100%', fontSize: 10, padding: '5px 6px',
          background: 'transparent', color: theme.text,
          border: `1px solid ${theme.border}`, borderRadius: 3, cursor: 'pointer'
        }}
      >Reset default palette</button>
      <div style={{
        marginTop: 8, padding: 8,
        background: theme.bg, borderRadius: 3,
        border: `1px dashed ${theme.border}`,
        fontSize: 10, color: theme.muted, lineHeight: 1.4,
        display: 'flex', alignItems: 'start', gap: 6
      }}>
        <Info size={11} style={{ color: theme.accent, marginTop: 1, flexShrink: 0 }} />
        <span>This is the default palette applied to every chart. To recolour an individual chart, click the <b>Color</b> button on that chart's top-right corner.</span>
      </div>
    </div>
  );
}


// ============================================================================
// CHART PANEL
// NEW in V5:
//   • Bottom-right button strip with "Line width" and "Axes" popovers
//   • X-axis title and Y-axis title on every visualization
//   • Configurable stroke width for Line / Area / Demographic
// ============================================================================
function ChartPanel({
  unit, indicators, data, initialChartType, initialShowExtrema,
  theme, title, subtitle, source, fontFamily, colors, frequency,
  xAxisTitle, yAxisTitle
}) {
  const svgContainerRef = useRef(null);
  const [dlOpen, setDlOpen] = useState(false);
  const [chartType, setChartType] = useState(initialChartType || 'Line');
  const [showExtrema, setShowExtrema] = useState(!!initialShowExtrema);
  const [transform, setTransform] = useState('None');
  const [showGrid, setShowGrid] = useState(true);

  // NEW controls — per-panel
  const [lineWidth, setLineWidth] = useState(2);
  const [xTitle, setXTitle] = useState(xAxisTitle ?? '');
  const [yTitle, setYTitle] = useState(yAxisTitle ?? unit ?? '');
  const [xAngle, setXAngle] = useState(0);
  const [yMin, setYMin]     = useState('');
  const [yMax, setYMax]     = useState('');
  const [swapAxes, setSwapAxes] = useState(false); // horizontal/vertical orientation for Bar chart

  // Per-chart colour override state.
  // Starts from the `colors` prop; auto-expands so each series has its own
  // editable slot in the picker modal.
  const buildInitialColors = () => {
    const base = (colors && colors.length) ? colors.slice() : SERIES_COLORS.slice();
    const n = Math.max(base.length, data.length || 1);
    const out = [];
    for (let i = 0; i < n; i++) out.push(base[i % base.length]);
    return out;
  };
  const [localColors, setLocalColors] = useState(buildInitialColors);
  // Re-sync when the upstream default palette changes
  useEffect(() => { setLocalColors(buildInitialColors()); /* eslint-disable-next-line */ }, [colors]);
  // Ensure palette length keeps up if the series count grows
  useEffect(() => {
    setLocalColors(cur => {
      if (cur.length >= data.length) return cur;
      const out = cur.slice();
      for (let i = cur.length; i < data.length; i++) out.push(cur[i % Math.max(1, cur.length)] || '#808080');
      return out;
    });
  }, [data.length]);

  const [colorModalOpen, setColorModalOpen] = useState(false);
  const [colorActiveIdx, setColorActiveIdx] = useState(0);

  // Popover state for the two bottom-right buttons
  const [lwOpen, setLwOpen]   = useState(false);
  const [axOpen, setAxOpen]   = useState(false);
  const lwRef = useRef(null), axRef = useRef(null);
  useEffect(() => {
    const h = (e) => {
      if (lwRef.current && !lwRef.current.contains(e.target)) setLwOpen(false);
      if (axRef.current && !axRef.current.contains(e.target)) setAxOpen(false);
    };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const availableChartTypes = useMemo(() => {
    const base = ['Line', 'Bar', 'Area', 'Pie'];
    const selectedIds = data.map(d => d.id);
    if (canShowDemographic(selectedIds)) base.push('Demographic');
    return base;
  }, [data]);
  useEffect(() => {
    if (!availableChartTypes.includes(chartType)) setChartType('Line');
  }, [availableChartTypes, chartType]);

  // Apply transformation per series — passes frequency through to HP filter
  const transformedData = useMemo(() => {
    if (transform === 'None') return data;
    return data.map(d => {
      const values = d.series.map(s => s.value);
      const newVals = transformSeries(values, transform, frequency);
      return { ...d, series: d.series.map((s, i) => ({ ...s, value: newVals[i] })) };
    });
  }, [data, transform, frequency]);

  const logDisabled = useMemo(
    () => data.some(d => d.series.some(s => typeof s.value === 'number' && s.value <= 0)),
    [data]
  );
  const availableTransforms = [
    'None',
    'Log',
    'First difference',
    'Z-score',
    'Robust (IQR)',
    'Log + Diff (forecasting)',
    'Log + Z-score (ML, few outliers)',
    'Log + Robust-IQR (ML, many outliers)',
    'Kalman Filter (trend)',
    'Kalman Filter (cycle)',
    'HP Filter (trend)',
    'HP Filter (cycle)'
  ];

  const palette = (localColors && localColors.length) ? localColors : SERIES_COLORS;

  const chartData = useMemo(() => {
    if (!transformedData || transformedData.length === 0) return [];
    const labels = transformedData[0].series.map(s => s.label);
    return labels.map((lbl, i) => {
      const row = { label: lbl };
      transformedData.forEach(d => { row[d.id] = d.series[i]?.value; });
      return row;
    });
  }, [transformedData]);

  const extrema = useMemo(() => {
    if (!showExtrema || chartType !== 'Line' || transformedData.length === 0) return null;
    return transformedData.map(d => ({ id: d.id, ...findExtrema(d.series.filter(s => s.value !== null)) }));
  }, [transformedData, showExtrema, chartType]);

  const handleDownloadImage = (fmt) => {
    const svg = svgContainerRef.current?.querySelector('svg');
    if (!svg) return;
    const safe = (title || 'chart').replace(/[^a-z0-9]+/gi, '_').toLowerCase();
    if (fmt === 'PNG') {
      downloadSVGAsPNG(svg, `${safe}.png`);
    } else if (fmt === 'SVG') {
      const serializer = new XMLSerializer();
      const str = serializer.serializeToString(svg);
      const blob = new Blob([str], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${safe}.svg`; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } else if (fmt === 'PDF') {
      window.print();
    } else if (fmt === 'EMF') {
      alert('EMF export is handled server-side in the production build.');
    }
    setDlOpen(false);
  };

  const handleDownloadData = (fmt, useTransformed) => {
    const src = useTransformed ? transformedData : data;
    const labels = src[0]?.series.map(s => s.label) || [];
    const header = ['Period', ...src.map(d => d.name)];
    const rows = labels.map((lbl, i) => [lbl, ...src.map(d => d.series[i]?.value ?? '')]);
    const suffix = useTransformed ? `_${transform.replace(/[^a-z0-9]+/gi, '').toLowerCase()}` : '';
    const safe = ((title || 'data') + suffix).replace(/[^a-z0-9]+/gi, '_').toLowerCase();
    if (fmt === 'CSV')        downloadCSV(`${safe}.csv`, [header, ...rows]);
    else if (fmt === 'Excel') downloadCSV(`${safe}.xls`, [header, ...rows]);
    setDlOpen(false);
  };

  const isPie = chartType === 'Pie' || chartType === 'Demographic';

  const pieData = useMemo(() => {
    if (!isPie || transformedData.length === 0) return [];
    return transformedData.map((d, idx) => ({
      name: d.name.replace(/^Population — /, ''),
      value: d.series[d.series.length - 1]?.value || 0,
      color: palette[idx % palette.length]
    }));
  }, [transformedData, isPie, palette]);

  const fmt = (v) => {
    if (typeof v !== 'number') return v;
    if (Math.abs(v) >= 1000) return v.toLocaleString('en-US', { maximumFractionDigits: 1 });
    return v.toFixed(2);
  };

  const yDomain = useMemo(() => {
    const mn = yMin !== '' && !isNaN(+yMin) ? +yMin : 'auto';
    const mx = yMax !== '' && !isNaN(+yMax) ? +yMax : 'auto';
    return [mn, mx];
  }, [yMin, yMax]);

  const renderChart = () => {
    if (chartData.length === 0) return <div style={{ padding: 40, color: theme.muted, textAlign: 'center' }}>No data</div>;

    const xAxisProps = {
      stroke: theme.muted,
      tick: { fill: theme.muted, fontSize: 10, fontFamily },
      axisLine: { stroke: theme.border },
      angle: xAngle,
      textAnchor: xAngle !== 0 ? 'end' : 'middle',
      height: xAngle !== 0 ? 50 : 30
    };
    const yAxisProps = {
      stroke: theme.muted,
      tick: { fill: theme.muted, fontSize: 10, fontFamily },
      axisLine: { stroke: theme.border },
      width: yTitle ? 64 : 50,
      tickFormatter: fmt,
      domain: yDomain
    };

    const xAxisLabel = xTitle ? {
      value: xTitle, position: 'insideBottom', offset: -4,
      style: { fill: theme.muted, fontSize: 10, fontFamily, fontWeight: 600 }
    } : null;
    const yAxisLabel = yTitle ? {
      value: yTitle, angle: -90, position: 'insideLeft',
      style: { fill: theme.muted, fontSize: 10, fontFamily, fontWeight: 600, textAnchor: 'middle' }
    } : null;

    if (isPie) {
      return (
        <PieChart>
          <Pie
            data={pieData}
            dataKey="value"
            nameKey="name"
            cx="50%" cy="50%"
            outerRadius="72%"
            innerRadius={chartType === 'Demographic' ? '40%' : 0}
            paddingAngle={2}
            label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}
            labelLine={false}
            stroke={theme.chartBg === 'transparent' ? '#FFFFFF' : theme.chartBg}
          >
            {pieData.map((e, i) => <Cell key={i} fill={e.color} />)}
          </Pie>
          <Tooltip contentStyle={{ background: theme.surface, border: `1px solid ${theme.border}`, fontSize: 12 }} />
        </PieChart>
      );
    }

    const bottomMargin = xTitle ? 28 : 10;
    const leftMargin   = yTitle ? 14 : 0;

    if (chartType === 'Bar') {
      // "Swap axes" produces a horizontal bar chart
      const layout = swapAxes ? 'vertical' : 'horizontal';
      return (
        <BarChart data={chartData} layout={layout}
          margin={{ top: 10, right: 16, bottom: bottomMargin, left: leftMargin }}>
          {showGrid && <CartesianGrid strokeDasharray="2 4" stroke={theme.border}
            vertical={layout === 'vertical'} horizontal={layout === 'horizontal'} />}
          {layout === 'horizontal' ? (
            <>
              <XAxis dataKey="label" {...xAxisProps} interval="preserveStartEnd" label={xAxisLabel} />
              <YAxis {...yAxisProps} label={yAxisLabel} />
            </>
          ) : (
            <>
              <XAxis type="number" {...yAxisProps} label={xAxisLabel} />
              <YAxis type="category" dataKey="label" {...xAxisProps} width={90} label={yAxisLabel} />
            </>
          )}
          <Tooltip contentStyle={{ background: theme.surface, border: `1px solid ${theme.border}`, fontSize: 12 }} formatter={fmt} />
          <Legend wrapperStyle={{ fontSize: 'clamp(9px, 2.5cqi, 11px)', fontFamily }} />
          {transformedData.map((d, i) => (
            <Bar key={d.id} dataKey={d.id} name={d.name} fill={palette[i % palette.length]} radius={[2, 2, 0, 0]} />
          ))}
        </BarChart>
      );
    }

    if (chartType === 'Area') {
      return (
        <AreaChart data={chartData} margin={{ top: 10, right: 16, bottom: bottomMargin, left: leftMargin }}>
          {showGrid && <CartesianGrid strokeDasharray="2 4" stroke={theme.border} vertical={false} />}
          <XAxis dataKey="label" {...xAxisProps} interval="preserveStartEnd" label={xAxisLabel} />
          <YAxis {...yAxisProps} label={yAxisLabel} />
          <Tooltip contentStyle={{ background: theme.surface, border: `1px solid ${theme.border}`, fontSize: 12 }} formatter={fmt} />
          <Legend wrapperStyle={{ fontSize: 'clamp(9px, 2.5cqi, 11px)', fontFamily }} />
          {transformedData.map((d, i) => (
            <Area key={d.id} type="monotone" dataKey={d.id} name={d.name}
              stroke={palette[i % palette.length]}
              fill={palette[i % palette.length]}
              fillOpacity={0.18} strokeWidth={lineWidth} />
          ))}
        </AreaChart>
      );
    }

    // Line (default)
    return (
      <ComposedChart data={chartData} margin={{ top: 10, right: 16, bottom: bottomMargin, left: leftMargin }}>
        {showGrid && <CartesianGrid strokeDasharray="2 4" stroke={theme.border} vertical={false} />}
        <XAxis dataKey="label" {...xAxisProps} interval="preserveStartEnd" label={xAxisLabel} />
        <YAxis {...yAxisProps} label={yAxisLabel} />
        {extrema && extrema.flatMap((ex, si) => {
          const bands = [];
          const lastIdx = chartData.length - 1;
          const bandFor = (idx, kind) => {
            const left  = chartData[Math.max(0, idx - 1)]?.label;
            const right = chartData[Math.min(lastIdx, idx + 1)]?.label;
            if (left == null || right == null) return null;
            return (
              <ReferenceArea
                key={`${kind}-${si}-${idx}`}
                x1={left} x2={right}
                fill="#EDEDED"
                fillOpacity={0.4}
                strokeOpacity={0}
                ifOverflow="visible"
              />
            );
          };
          ex.peaks.forEach(idx => { const b = bandFor(idx, 'p'); if (b) bands.push(b); });
          ex.troughs.forEach(idx => { const b = bandFor(idx, 't'); if (b) bands.push(b); });
          return bands;
        })}
        <Tooltip contentStyle={{ background: theme.surface, border: `1px solid ${theme.border}`, fontSize: 12 }} formatter={fmt} />
        <Legend wrapperStyle={{ fontSize: 'clamp(9px, 2.5cqi, 11px)', fontFamily }} />
        {transformedData.map((d, i) => (
          <Line key={d.id} type="monotone" dataKey={d.id} name={d.name}
            stroke={palette[i % palette.length]}
            strokeWidth={lineWidth} dot={false} activeDot={{ r: Math.max(3, lineWidth + 2) }}
            connectNulls={false} />
        ))}
      </ComposedChart>
    );
  };

  return (
    <div style={{
      background: theme.surface,
      border: `1px solid ${theme.border}`,
      borderRadius: 6,
      overflow: 'hidden',
      display: 'flex', flexDirection: 'column',
      containerType: 'inline-size',
      position: 'relative'
    }}>
      {/* Header */}
      <div style={{ padding: '10px 14px', borderBottom: `1px solid ${theme.border}`,
        display: 'flex', alignItems: 'start', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap' }}>
        <div style={{ flex: '1 1 180px', minWidth: 0 }}>
          {title && <div style={{ fontSize: 'clamp(11px, 3cqi, 15px)', fontWeight: 600, color: theme.text, fontFamily, lineHeight: 1.25 }}>{title}</div>}
          {subtitle && <div style={{ fontSize: 'clamp(9px, 2.3cqi, 12px)', color: theme.muted, marginTop: 2, fontFamily, lineHeight: 1.3 }}>{subtitle}</div>}
          <div style={{ fontSize: 'clamp(8px, 1.8cqi, 10px)', color: theme.muted, marginTop: 4, textTransform: 'uppercase', letterSpacing: '0.06em' }}>
            Unit: {unit}{transform !== 'None' ? ` · ${transform}` : ''}
          </div>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
          {chartType === 'Line' && (
            <button
              onClick={() => setShowExtrema(!showExtrema)}
              title={showExtrema ? 'Hide peaks & troughs' : 'Show peaks & troughs'}
              style={{
                display: 'flex', alignItems: 'center', gap: 4,
                padding: '5px 8px', fontSize: 10,
                background: showExtrema ? theme.accent : 'transparent',
                color: showExtrema ? (theme.buttonText || '#FFFFFF') : theme.text,
                border: `1px solid ${showExtrema ? theme.accent : theme.border}`,
                borderRadius: 4, cursor: 'pointer'
              }}
            >
              <Activity size={10} /> Peaks
            </button>
          )}
          <button
            onClick={() => setShowGrid(!showGrid)}
            title={showGrid ? 'Hide chart gridlines' : 'Show chart gridlines'}
            style={{
              display: 'flex', alignItems: 'center', gap: 4,
              padding: '5px 8px', fontSize: 10,
              background: showGrid ? theme.accent : 'transparent',
              color: showGrid ? (theme.buttonText || '#FFFFFF') : theme.text,
              border: `1px solid ${showGrid ? theme.accent : theme.border}`,
              borderRadius: 4, cursor: 'pointer'
            }}
          >
            <Grid size={10} /> Grid
          </button>
          <div style={{ width: 108 }}>
            <Dropdown
              value={chartType}
              options={availableChartTypes}
              onChange={setChartType}
              theme={theme} compact
            />
          </div>
          <div style={{ width: 178 }}>
            <Dropdown
              value={(transform.startsWith('Log') && logDisabled) ? 'None' : transform}
              options={availableTransforms.map(t => (t.startsWith('Log') && logDisabled && !t.startsWith('Log Filter')) ? `${t} (n/a)` : t)}
              onChange={(v) => setTransform(v.endsWith('(n/a)') ? 'None' : v)}
              theme={theme} compact
            />
          </div>
          <div className="relative">
            <button
              onClick={() => setDlOpen(!dlOpen)}
              style={{
                display: 'flex', alignItems: 'center', gap: 4,
                padding: '5px 10px', fontSize: 11,
                background: 'transparent', color: theme.text,
                border: `1px solid ${theme.border}`, borderRadius: 4
              }}
            >
              <Download size={12} /> Export
            </button>
            {dlOpen && (
              <div style={{
                position: 'absolute', right: 0, top: '100%', marginTop: 4,
                background: theme.surface, border: `1px solid ${theme.border}`,
                borderRadius: 4, boxShadow: '0 4px 14px rgba(0,0,0,0.14)', zIndex: 40, minWidth: 200
              }}>
                <div style={{ padding: '6px 10px', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.08em', color: theme.muted, borderBottom: `1px solid ${theme.border}` }}>Chart image</div>
                {['PNG', 'SVG', 'PDF', 'EMF'].map(f => (
                  <button key={f} onClick={() => handleDownloadImage(f)}
                    className="flex items-center gap-2 w-full text-left"
                    style={{ padding: '6px 10px', fontSize: 12, color: theme.text }}
                    onMouseEnter={e => e.currentTarget.style.background = theme.border}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <ImageIcon size={11} /> {f}
                  </button>
                ))}
                <div style={{ padding: '6px 10px', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.08em', color: theme.muted, borderTop: `1px solid ${theme.border}`, borderBottom: `1px solid ${theme.border}` }}>Raw data</div>
                {['CSV', 'Excel'].map(f => (
                  <button key={`raw-${f}`} onClick={() => handleDownloadData(f, false)}
                    className="flex items-center gap-2 w-full text-left"
                    style={{ padding: '6px 10px', fontSize: 12, color: theme.text }}
                    onMouseEnter={e => e.currentTarget.style.background = theme.border}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <FileSpreadsheet size={11} /> {f}
                  </button>
                ))}
                {transform !== 'None' && (
                  <>
                    <div style={{ padding: '6px 10px', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.08em', color: theme.muted, borderTop: `1px solid ${theme.border}`, borderBottom: `1px solid ${theme.border}` }}>Transformed data · {transform}</div>
                    {['CSV', 'Excel'].map(f => (
                      <button key={`tr-${f}`} onClick={() => handleDownloadData(f, true)}
                        className="flex items-center gap-2 w-full text-left"
                        style={{ padding: '6px 10px', fontSize: 12, color: theme.text }}
                        onMouseEnter={e => e.currentTarget.style.background = theme.border}
                        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                        <Sigma size={11} /> {f}
                      </button>
                    ))}
                  </>
                )}
              </div>
            )}
          </div>

          {/* Per-chart Color button — opens the full MS-Word-style modal */}
          <button
            onClick={() => { setColorActiveIdx(0); setColorModalOpen(true); }}
            title="Change this chart's colours"
            style={{
              display: 'flex', alignItems: 'center', gap: 4,
              padding: '5px 10px', fontSize: 11,
              background: 'transparent', color: theme.text,
              border: `1px solid ${theme.border}`, borderRadius: 4,
              cursor: 'pointer'
            }}
          >
            <PaletteIcon size={12} /> Color
          </button>
        </div>
      </div>

      {/* Chart area */}
      <div ref={svgContainerRef} style={{
        background: theme.chartBg === 'transparent' ? '#FFFFFF' : theme.chartBg,
        padding: 10,
        position: 'relative'
      }}>
        <div style={{ width: '100%', height: 300, fontFamily }}>
          <ResponsiveContainer>{renderChart()}</ResponsiveContainer>
        </div>
        {source && (
          <div style={{ fontSize: 'clamp(8px, 1.8cqi, 10px)', color: theme.muted, marginTop: 6, fontStyle: 'italic', fontFamily }}>
            Source: {source}
          </div>
        )}

        {/* ===== BOTTOM-RIGHT CONTROL STRIP (Line width + H/V axes) ===== */}
        <div style={{
          position: 'absolute', right: 10, bottom: source ? 24 : 10,
          display: 'flex', gap: 4, zIndex: 5
        }}>
          {/* Line width */}
          {(chartType === 'Line' || chartType === 'Area') && (
            <div ref={lwRef} style={{ position: 'relative' }}>
              <button
                onClick={() => { setLwOpen(!lwOpen); setAxOpen(false); }}
                title="Adjust line width"
                style={{
                  display: 'flex', alignItems: 'center', gap: 4,
                  padding: '4px 8px', fontSize: 10,
                  background: theme.surface, color: theme.text,
                  border: `1px solid ${theme.border}`, borderRadius: 4,
                  boxShadow: '0 2px 6px rgba(0,0,0,0.08)', cursor: 'pointer'
                }}
              >
                <Minus size={11} strokeWidth={Math.max(1, lineWidth)} /> Line&nbsp;width
                <span style={{ color: theme.muted, marginLeft: 2 }}>{lineWidth}px</span>
              </button>
              {lwOpen && (
                <div style={{
                  position: 'absolute', right: 0, bottom: '100%', marginBottom: 4, zIndex: 20,
                  background: theme.surface, border: `1px solid ${theme.border}`,
                  borderRadius: 4, boxShadow: '0 4px 14px rgba(0,0,0,0.18)',
                  padding: 8, minWidth: 180
                }}>
                  <div style={{ fontSize: 10, textTransform: 'uppercase',
                    letterSpacing: '0.08em', color: theme.muted, marginBottom: 6 }}>
                    Stroke width
                  </div>
                  {[1, 1.5, 2, 2.5, 3, 4].map(w => (
                    <button key={w}
                      onClick={() => { setLineWidth(w); setLwOpen(false); }}
                      style={{
                        display: 'flex', alignItems: 'center', gap: 10, width: '100%',
                        padding: '5px 6px', fontSize: 11,
                        background: lineWidth === w ? theme.border : 'transparent',
                        color: theme.text,
                        border: 'none', borderRadius: 3, cursor: 'pointer'
                      }}
                      onMouseEnter={e => { if (lineWidth !== w) e.currentTarget.style.background = theme.bg; }}
                      onMouseLeave={e => { if (lineWidth !== w) e.currentTarget.style.background = 'transparent'; }}
                    >
                      <span style={{
                        display: 'inline-block', width: 50, height: 0,
                        borderTop: `${w}px solid ${theme.accent}`
                      }} />
                      <span>{w} px</span>
                      {lineWidth === w && <Check size={11} style={{ marginLeft: 'auto', color: theme.accent }} />}
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* H & V axes */}
          {!isPie && (
            <div ref={axRef} style={{ position: 'relative' }}>
              <button
                onClick={() => { setAxOpen(!axOpen); setLwOpen(false); }}
                title="Adjust horizontal & vertical axes"
                style={{
                  display: 'flex', alignItems: 'center', gap: 4,
                  padding: '4px 8px', fontSize: 10,
                  background: theme.surface, color: theme.text,
                  border: `1px solid ${theme.border}`, borderRadius: 4,
                  boxShadow: '0 2px 6px rgba(0,0,0,0.08)', cursor: 'pointer'
                }}
              >
                <Sliders size={11} /> H&nbsp;&amp;&nbsp;V&nbsp;axes
              </button>
              {axOpen && (
                <div style={{
                  position: 'absolute', right: 0, bottom: '100%', marginBottom: 4, zIndex: 20,
                  background: theme.surface, border: `1px solid ${theme.border}`,
                  borderRadius: 4, boxShadow: '0 4px 14px rgba(0,0,0,0.18)',
                  padding: 10, minWidth: 260
                }}>
                  <div style={{ fontSize: 10, textTransform: 'uppercase',
                    letterSpacing: '0.08em', color: theme.muted, marginBottom: 6 }}>
                    Horizontal axis (X)
                  </div>
                  <input
                    value={xTitle}
                    onChange={e => setXTitle(e.target.value)}
                    placeholder="X-axis title"
                    style={{
                      width: '100%', padding: '5px 7px', fontSize: 11,
                      background: theme.bg, color: theme.text,
                      border: `1px solid ${theme.border}`, borderRadius: 3, outline: 'none',
                      marginBottom: 6
                    }}
                  />
                  <div style={{ display: 'flex', gap: 4, marginBottom: 8 }}>
                    {[0, 30, 45, 90].map(a => (
                      <button key={a}
                        onClick={() => setXAngle(-a)}
                        style={{
                          flex: 1, fontSize: 10, padding: '3px 4px',
                          background: -xAngle === a ? theme.accent : 'transparent',
                          color: -xAngle === a ? (theme.buttonText || '#FFFFFF') : theme.text,
                          border: `1px solid ${-xAngle === a ? theme.accent : theme.border}`,
                          borderRadius: 3, cursor: 'pointer'
                        }}
                      >{a}°</button>
                    ))}
                  </div>

                  <div style={{ fontSize: 10, textTransform: 'uppercase',
                    letterSpacing: '0.08em', color: theme.muted, marginBottom: 6 }}>
                    Vertical axis (Y)
                  </div>
                  <input
                    value={yTitle}
                    onChange={e => setYTitle(e.target.value)}
                    placeholder="Y-axis title"
                    style={{
                      width: '100%', padding: '5px 7px', fontSize: 11,
                      background: theme.bg, color: theme.text,
                      border: `1px solid ${theme.border}`, borderRadius: 3, outline: 'none',
                      marginBottom: 6
                    }}
                  />
                  <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
                    <input
                      value={yMin}
                      onChange={e => setYMin(e.target.value)}
                      placeholder="Y min"
                      style={{
                        flex: 1, padding: '5px 7px', fontSize: 11,
                        background: theme.bg, color: theme.text,
                        border: `1px solid ${theme.border}`, borderRadius: 3, outline: 'none'
                      }}
                    />
                    <input
                      value={yMax}
                      onChange={e => setYMax(e.target.value)}
                      placeholder="Y max"
                      style={{
                        flex: 1, padding: '5px 7px', fontSize: 11,
                        background: theme.bg, color: theme.text,
                        border: `1px solid ${theme.border}`, borderRadius: 3, outline: 'none'
                      }}
                    />
                  </div>

                  {chartType === 'Bar' && (
                    <label style={{ display: 'flex', alignItems: 'center', gap: 6,
                      fontSize: 11, color: theme.text, cursor: 'pointer', marginBottom: 6 }}>
                      <input type="checkbox" checked={swapAxes}
                        onChange={e => setSwapAxes(e.target.checked)}
                        style={{ accentColor: theme.accent }} />
                      Swap axes (horizontal bars)
                    </label>
                  )}

                  <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 4 }}>
                    <button
                      onClick={() => {
                        setXTitle(''); setYTitle(unit || '');
                        setXAngle(0); setYMin(''); setYMax(''); setSwapAxes(false);
                      }}
                      style={{
                        fontSize: 10, padding: '3px 8px',
                        background: 'transparent', color: theme.text,
                        border: `1px solid ${theme.border}`, borderRadius: 3, cursor: 'pointer'
                      }}
                    >Reset</button>
                    <button
                      onClick={() => setAxOpen(false)}
                      style={{
                        fontSize: 10, padding: '3px 10px',
                        background: theme.accent, color: theme.buttonText || '#FFFFFF',
                        border: 'none', borderRadius: 3, cursor: 'pointer'
                      }}
                    >Done</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {colorModalOpen && (
        <ColorPickerModal
          colors={localColors}
          activeIndex={Math.min(colorActiveIdx, localColors.length - 1)}
          onChangeColors={setLocalColors}
          onChangeActive={setColorActiveIdx}
          onClose={() => setColorModalOpen(false)}
          theme={theme}
        />
      )}
    </div>
  );
}

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const { isMobile, isTablet, isDesktop } = useViewport();

  // Auth
  const [loggedIn, setLoggedIn] = useState(false);
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [showPwd, setShowPwd] = useState(false);

  // Theme
  const [themeKey, setThemeKey] = useState('institutional');
  const theme = THEMES[themeKey];

  // Data (generate once)
  const { months, series } = useMemo(() => generateData(), []);

  // Tab / Variable selection  (Topic layer removed from the UI)
  const [activeTab, setActiveTab] = useState('Payment Statistics');
  const [selectedIndicators, setSelectedIndicators] = useState(['tiss_vol', 'tiss_val']);

  const [endDate, setEndDate] = useState('2025-12');
  const [frequency, setFrequency] = useState('Monthly');
  const [location, setLocation] = useState('Tanzania');
  const [chartType, setChartType] = useState('Line');
  const [showExtrema, setShowExtrema] = useState(false);

  // Chart annotation options
  const [chartTitle, setChartTitle] = useState('TISS transactions');
  const [chartSubtitle, setChartSubtitle] = useState('Volume and value of large-value transfers');
  const [chartSource, setChartSource] = useState('Bank of Tanzania — synthetic demo dataset');
  const [fontFamily, setFontFamily] = useState('"IBM Plex Sans", system-ui, sans-serif');

  // NEW: default axis titles
  const [xAxisTitle, setXAxisTitle] = useState('Period');
  const [yAxisTitle, setYAxisTitle] = useState('');

  // Visualize state
  const [visualized, setVisualized] = useState(false);
  const [gridMode, setGridMode] = useState('by_unit');
  const [gridColsOverride, setGridColsOverride] = useState(null);

  // NEW: color state — swatches + preset name
  const [colorPalette, setColorPalette] = useState('Default (institutional)');
  const [customColors, setCustomColors] = useState(PALETTES['Default (institutional)'].slice());

  const monthOptions = useMemo(() => months.map(m => m.key), [months]);
  const unitOptions = ['All units', ...Array.from(new Set(INDICATORS.map(i => i.unit)))];

  // All indicators in the active tab — grouped by topic at render time
  const indicatorOptions = useMemo(() => {
    return INDICATORS.filter(i =>
      i.category === activeTab &&
      (unitFilter === 'All units' || i.unit === unitFilter));
  }, [activeTab, unitFilter]);

  const handleTabClick = (cat) => {
    setActiveTab(cat);
    // Default: pick the first topic's variables for a friendly start
    const firstTopic = INDICATORS.find(i => i.category === cat)?.topic;
    const ids = INDICATORS.filter(i => i.category === cat && i.topic === firstTopic).map(i => i.id);
    setSelectedIndicators(ids);
    setVisualized(false);
  };

  const handleVisualize = () => {
    if (selectedIndicators.length === 0) return;
    setVisualized(true);
  };

  const handleReset = () => {
    setSelectedIndicators([]);
    setUnitFilter('All units');
    setStartDate('2021-01');
    setEndDate('2025-12');
    setFrequency('Monthly');
    setLocation('Tanzania');
    setVisualized(false);
  };

  // Build visualization data
  const visData = useMemo(() => {
    if (!visualized) return [];
    const startIdx = months.findIndex(m => m.key === startDate);
    const endIdx = months.findIndex(m => m.key === endDate);
    const s = Math.max(0, startIdx);
    const e = endIdx === -1 ? months.length - 1 : endIdx;
    const slicedMonths = months.slice(s, e + 1);
    return selectedIndicators.map(id => {
      const meta = INDICATORS.find(i => i.id === id);
      const vals = series[id].slice(s, e + 1);
      const agg = aggregate(slicedMonths, vals, frequency, meta.aggregation);
      return { id, name: meta.name, topic: meta.topic, unit: meta.unit,
               aggregation: meta.aggregation, series: agg };
    });
  }, [visualized, selectedIndicators, startDate, endDate, frequency, months, series]);

  const panels = useMemo(() => {
    if (gridMode === 'per_indicator') {
      return visData.map(d => ({ key: d.id, unit: d.unit, title: `${d.topic} — ${d.name}`, data: [d] }));
    }
    const g = {};
    visData.forEach(d => { (g[d.unit] = g[d.unit] || []).push(d); });
    return Object.entries(g).map(([unit, data]) => ({ key: unit, unit, title: null, data }));
  }, [visData, gridMode]);

  const minPanelWidth = useMemo(() => {
    const n = panels.length;
    if (n <= 1) return 0;
    const span = visData[0]?.series.length || 0;
    if (span <= 8)       return 240;
    if (span <= 16)      return 320;
    if (span <= 36)      return 400;
    return 480;
  }, [panels, visData]);

  // ------------------- LOGIN SCREEN -------------------
  if (!loggedIn) {
    return (
      <div style={{
        minHeight: '100vh',
        background: `linear-gradient(135deg, ${BRAND.navy} 0%, #0A1F44 50%, ${BRAND.charcoal} 100%)`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 24, fontFamily: '"IBM Plex Sans", system-ui, sans-serif'
      }}>

            <div style={{ fontSize: 9, color: BRAND.midGrey, marginTop: 14, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 600 }}>
              Bank of Tanzania
            </div>
            <div style={{ fontSize: 18, color: BRAND.navy, marginTop: 10, fontWeight: 600, fontFamily: 'Georgia, serif' }}>
              Economic Statistical Portal

              <input

                {showPwd ? <EyeOff size={14} /> : <Eye size={14} />}
