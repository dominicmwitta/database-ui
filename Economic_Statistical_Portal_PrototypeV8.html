            </div>
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', margin: '14px 0 22px', fontSize: 11 }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 6, color: BRAND.charcoal, cursor: 'pointer' }}>
              <input type="checkbox" style={{ accentColor: BRAND.navy }} /> Remember me
            </label>
            <a style={{ color: BRAND.navy, cursor: 'pointer' }}>Forgot password?</a>
          </div>

          <button
            onClick={() => setLoggedIn(true)}
            style={{
              width: '100%', padding: '11px', background: BRAND.navy, color: '#FFFFFF',
              border: 'none', borderRadius: 4, fontSize: 13, fontWeight: 600,
              letterSpacing: '0.04em', cursor: 'pointer'
            }}
          >
            SIGN IN
          </button>

          <div style={{ textAlign: 'center', fontSize: 10, color: BRAND.midGrey, marginTop: 20 }}>
            Demo prototype — any credentials will sign you in
          </div>
        </div>
      </div>
    );
  }

  // ------------------- DASHBOARD -------------------
  return (
    <div style={{
      minHeight: '100vh', background: theme.bg, color: theme.text,
      fontFamily, transition: 'background 0.25s, color 0.25s'

      {/* STICKY HERO + TABS */}
      <div style={{ position: 'sticky', top: 0, zIndex: 30 }}>
        <div style={{

          <div className="flex items-center gap-2">

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, flexWrap: 'wrap' }}>
                <div style={{ fontSize: 11, color: theme.muted }}>
                  {selectedIndicators.length} indicator{selectedIndicators.length > 1 ? 's' : ''} · {frequency} · {location}
                  {panels.length > 1 && ` · ${panels.length} panels · responsive grid`}
                </div>
                <button onClick={() => setVisualized(false)}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 5,
                    fontSize: 11, color: theme.accent, background: 'transparent',
                    border: `1px solid ${theme.border}`, padding: '5px 10px', borderRadius: 4, cursor: 'pointer'
                  }}>
                  <Settings size={11} /> Edit query
                </button>
              </div>

              <div style={{
                display: 'grid',
                gridTemplateColumns:
                  gridColsOverride !== null
                    ? `repeat(${gridColsOverride}, minmax(0, 1fr))`
                    : (minPanelWidth === 0
                        ? '1fr'
                        : `repeat(auto-fit, minmax(${minPanelWidth}px, 1fr))`),
                gap: 14
              }}>
                {panels.map(p => (
                  <ChartPanel key={p.key}
                    unit={p.unit} indicators={p.data} data={p.data}
                    initialChartType={chartType}
                    initialShowExtrema={showExtrema}
                    theme={theme}
                    title={p.title || (panels.length > 1 ? `${chartTitle} · ${p.unit}` : chartTitle)}
                    subtitle={chartSubtitle}
                    source={chartSource}
                    fontFamily={fontFamily}
                    colors={customColors}
                    frequency={frequency}
                    xAxisTitle={xAxisTitle}
                    yAxisTitle={yAxisTitle || p.unit} />
                ))}
              </div>
            </div>
          )}
        </div>

        {/* RIGHT PANEL (post-viz summary) */}
        {visualized && !isMobile && (
          <div style={{
            width: isTablet ? 230 : 250,
            flexShrink: 0, position: 'sticky', top: 115,
            background: theme.surface, border: `1px solid ${theme.border}`,
            borderRadius: 6, padding: 14
          }}>
            <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: theme.muted, marginBottom: 10 }}>
              Current query
            </div>

            <Label theme={theme}>Variables</Label>
            <MultiSelect selected={selectedIndicators} options={indicatorOptions}
              onChange={setSelectedIndicators}
              placeholder="Pick…" theme={theme} maxHeight={200} />

            <div style={{ height: 10 }} />
            <Label theme={theme}>Unit filter</Label>
            <Dropdown value={unitFilter} options={unitOptions} onChange={setUnitFilter} theme={theme} compact />

            <div style={{ height: 10 }} />
            <Label theme={theme}>Start date</Label>
            <DatePicker
              value={startDate}
              monthKeys={monthOptions}
              onChange={(k) => {
                setStartDate(k);
                if (keyCmp(k, endDate) > 0) setEndDate(k);
              }}
              theme={theme}
              label="Start date"
              maxKey={endDate}
            />

            <div style={{ height: 10 }} />
            <Label theme={theme}>End date</Label>
            <DatePicker
              value={endDate}
              monthKeys={monthOptions}
              onChange={(k) => {
                setEndDate(k);
                if (keyCmp(k, startDate) < 0) setStartDate(k);
              }}
              theme={theme}
              label="End date"
              minKey={startDate}
            />

            <div style={{ marginTop: 14, padding: 10, background: theme.bg, borderRadius: 4, border: `1px solid ${theme.border}` }}>
              <div style={{ display: 'flex', alignItems: 'start', gap: 6 }}>
                <Info size={11} style={{ color: theme.accent, marginTop: 2, flexShrink: 0 }} />
                <div style={{ fontSize: 10, color: theme.muted, lineHeight: 1.4 }}>
                  Each chart's bottom-right corner carries its own Line-width and H&amp;V-axes controls.
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {!isMobile && <div style={{ height: 64 }} />}
      {/* FOOTER */}
      <div style={{
        position: isMobile ? 'static' : 'fixed',
        bottom: isMobile ? 'auto' : 0,
        left: 0, right: 0, zIndex: 29,
        marginTop: isMobile ? 16 : 0,
        padding: '14px 24px',
        background: theme.heroBg, color: theme.heroText,
        borderTop: `2px solid ${theme.heroAccent}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10
      }}>
        <div style={{ fontSize: 10, opacity: 0.8 }}>
          © {new Date().getFullYear()} Bank of Tanzania. All rights reserved.
        </div>
        <div style={{ display: 'flex', gap: 18, fontSize: 10 }}>
          <a style={{ color: theme.heroText, opacity: 0.8 }}>Privacy Policy</a>
          <a style={{ color: theme.heroText, opacity: 0.8 }}>Terms of Use</a>
          <a style={{ color: theme.heroText, opacity: 0.8 }}>Contact Us</a>
        </div>
      </div>
    </div>
  );
}


// ---------- Mount ----------
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// Hide boot splash once React has rendered
requestAnimationFrame(() => {
  const boot = document.getElementById('boot');
  if (boot) {
    boot.classList.add('gone');
    setTimeout(() => boot.remove(), 350);
  }
});
</script>

</body>
</html>
